[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

; 1) Verwaltung (Node) — schreibt zuerst die Caddy-Konfiguration
[program:manager]
command=node /app/server.js
priority=10
autorestart=true
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

; 2) PHP-FPM — führt PHP-Websites aus (z. B. Montrigor)
[program:phpfpm]
command=php-fpm83 -F
priority=15
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

; 3) Caddy — wartet, bis die Konfiguration existiert, und liefert alles aus
[program:caddy]
command=/bin/sh -c "while [ ! -f /data/caddy/Caddyfile ]; do sleep 0.3; done; exec caddy run --config /data/caddy/Caddyfile --adapter caddyfile"
priority=20
autorestart=true
startretries=20
environment=XDG_DATA_HOME="/data/caddy/data",XDG_CONFIG_HOME="/data/caddy/config"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
